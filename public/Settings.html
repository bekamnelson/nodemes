<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Mon App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #0084ff;
            --danger-color: #e74c3c;
            --border-color: #eeeeee;
        }

        /* Variables Mode Sombre */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            transition: 0.3s;
        }

        .settings-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: var(--card-bg);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
            text-decoration: none;
        }

        .content {
            padding: 20px;
            flex: 1;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .setting-info i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        /* Switch Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 45px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(21px); }

        .logout-btn {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            padding: 15px 0;
        }
    </style>
</head>
<body id="body">

<div class="settings-container">
    <div class="header">
        <a href="chat.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2>Paramètres</h2>
    </div>

    <div class="content">
        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-moon"></i>
                <span>Mode Sombre</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Se déconnecter</span>
        </div>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.getElementById('body');

    // Charger le thème au démarrage
    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        themeToggle.checked = true;
    }

    // Basculer le thème
    themeToggle.addEventListener('change', () => {
        if (themeToggle.checked) {
            body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark');
        } else {
            body.classList.remove('dark-mode');
            localStorage.setItem('theme', 'light');
        }
    });

    // Fonction de déconnexion
    async function logout() {
    if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
        try {
            const userId = localStorage.getItem("userId");

            // Optionnel : Prévenir le serveur via une route API
            await fetch("/logout", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId })
            });

            // Nettoyage complet côté client
            localStorage.clear(); 
            window.location.href = "login.html";
        } catch (err) {
            console.error("Erreur déconnexion:", err);
            // On déconnecte quand même le client en cas d'erreur serveur
            localStorage.clear();
            window.location.href = "login.html";
        }
    }
}
</script>

</body>
</html>
